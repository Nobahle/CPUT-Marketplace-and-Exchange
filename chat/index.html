<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CPUT Marketplace Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <img src="images/cput-logo.jpg" alt="CPUT Logo" class="cput-logo"/>
        CPUT Marketplace and Exchange
      </div>
    </header>
    <div class="main">
      <aside class="chat-list">
        <h2>Chats</h2>
        <ul>
          <li onclick="showChat('Nobahle Nzimande')" data-user="Nobahle Nzimande">
            <div class="chat-user-row">
              <img src="images/user icon.png" alt="User" class="chat-user-icon" />
              <strong>Nobahle Nzimande</strong>
            </div>
          </li>
          <li onclick="showChat('Namhla Brown')" data-user="Namhla Brown">
            <div class="chat-user-row">
              <img src="images/user icon.png" alt="User" class="chat-user-icon" />
              <strong>Namhla Brown</strong>
            </div>
          </li>
          <li onclick="showChat('Robert Wilson')" data-user="Robert Wilson">
            <div class="chat-user-row">
              <img src="images/user icon.png" alt="User" class="chat-user-icon" />
              <strong>Robert Wilson</strong>
            </div>
          </li>
          <li onclick="showChat('James Smith')" data-user="James Smith">
            <div class="chat-user-row">
              <img src="images/user icon.png" alt="User" class="chat-user-icon" />
              <strong>James Smith</strong>
            </div>
          </li>
          <li onclick="showChat('Aliyana Dalasile')" data-user="Aliyana Dalasile">
            <div class="chat-user-row">
              <img src="images/user icon.png" alt="User" class="chat-user-icon" />
              <strong>Aliyana Dalasile</strong>
            </div>
          </li>
        </ul>
      </aside>
      <section class="chat-window">
        <div class="chat-header">
          <div>
            <strong id="chat-header-username">Select a user</strong>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="message-input" placeholder="Type a message...">
          <button onclick="sendMessage()">Send</button>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
